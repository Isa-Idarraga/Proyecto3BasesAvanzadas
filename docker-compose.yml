services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest

    container_name: proyecto3_sqlserver

    environment:
      ACCEPT_EULA: ${ACCEPT_EULA}
      SA_PASSWORD: ${SA_PASSWORD}

    ports:
      - "1433:1433"

    volumes:
      - sql_data:/var/opt/mssql

    restart: unless-stopped

volumes:
   sql_data: